name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test-and-smoke:
    name: test-and-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Frontend lint (if present)
        working-directory: apps/frontend
        run: npm run lint --if-present

      - name: Frontend tests (if present)
        working-directory: apps/frontend
        run: npm test --if-present

      - name: Frontend build
        working-directory: apps/frontend
        run: npm run build

      - name: Install backend dependencies
        run: python -m pip install -r apps/backend/requirements.txt

      - name: Backend minimal runtime test
        run: |
          PYTHONPATH=apps/backend python -c "from app.main import app; assert app.title == 'GeoSnap API'"

      - name: Docker compose smoke check
        run: |
          set -euo pipefail
          cleanup() {
            docker compose down -v
          }
          trap cleanup EXIT

          docker compose up -d --build

          timeout 120 bash -c 'until curl -fsS http://127.0.0.1:8000/health | grep -q "\"status\":\"ok\""; do sleep 2; done'
